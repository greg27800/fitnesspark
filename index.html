<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FitnessPark">
<meta name="theme-color" content="#0D0D0F">
<title>FitnessPark Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --orange:#E8591A;--orange2:#FF7A3D;--dark:#0D0D0F;--dark2:#161618;
  --dark3:#1E1E22;--dark4:#28282E;--text:#F0EEE8;--muted:#7A7A85;
  --green:#4ADE80;--blue:#3B82F6;--blue2:#60A5FA;
  --safe-top:env(safe-area-inset-top,44px);
  --safe-bottom:env(safe-area-inset-bottom,20px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--dark);color:var(--text);font-family:'Barlow',sans-serif;overflow:hidden;position:fixed;width:100%}
.screen{position:absolute;inset:0;display:none;flex-direction:column}
.screen.active{display:flex}

/* ── HOME ── */
#home{background:var(--dark);overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding-top:calc(var(--safe-top) + 16px);padding-bottom:calc(var(--safe-bottom) + 90px)}
.home-header{padding:8px 24px 14px}
.home-logo{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:3px;color:var(--orange);text-transform:uppercase;margin-bottom:4px}
.home-title{font-family:'Barlow Condensed',sans-serif;font-size:42px;font-weight:900;line-height:1;color:var(--text);text-transform:uppercase}
.home-title span{color:var(--orange)}
.home-subtitle{font-size:13px;color:var(--muted);margin-top:4px}

/* ── SESSION SWITCHER ── */
.session-switcher{display:flex;gap:10px;padding:0 16px 16px}
.sess-btn{flex:1;border:none;border-radius:14px;padding:14px 10px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.sess-btn.active-sess{transform:scale(1.02)}
.sess-btn:active{transform:scale(.97)}
.sess-letter{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:900;line-height:1;display:block}
.sess-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;display:block;margin-top:2px;opacity:.8}
.sess-sub{font-size:10px;opacity:.6;margin-top:2px;display:block}
.sess-btn.sess-a{background:linear-gradient(135deg,rgba(232,89,26,.18),rgba(232,89,26,.08));border:2px solid rgba(232,89,26,.5);color:var(--orange)}
.sess-btn.sess-a.active-sess{background:linear-gradient(135deg,rgba(232,89,26,.35),rgba(232,89,26,.15));border-color:var(--orange)}
.sess-btn.sess-b{background:linear-gradient(135deg,rgba(59,130,246,.18),rgba(59,130,246,.08));border:2px solid rgba(59,130,246,.5);color:var(--blue2)}
.sess-btn.sess-b.active-sess{background:linear-gradient(135deg,rgba(59,130,246,.35),rgba(59,130,246,.15));border-color:var(--blue2)}
.sess-active-dot{width:8px;height:8px;border-radius:99px;position:absolute;top:10px;right:10px}
.sess-btn.sess-a .sess-active-dot{background:var(--orange)}
.sess-btn.sess-b .sess-active-dot{background:var(--blue2)}
.sess-btn:not(.active-sess) .sess-active-dot{display:none}
.sess-pct{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;margin-top:6px;display:block}

/* ── TIMELINE ── */
.timeline{display:flex;gap:0;padding:0 16px 14px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.timeline::-webkit-scrollbar{display:none}
.tl-block{flex-shrink:0;display:flex;flex-direction:column;align-items:center}
.tl-pill{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px;text-transform:uppercase;letter-spacing:.5px;border:1.5px solid;white-space:nowrap}
.tl-time{font-size:9px;color:var(--muted);margin-top:2px}
.tl-sep{width:12px;height:2px;background:var(--dark4);margin-top:14px;flex-shrink:0}

/* ── RING ── */
.progress-ring-wrap{display:flex;justify-content:center;padding:4px 0 14px;position:relative}
.progress-ring-wrap svg{transform:rotate(-90deg)}
.ring-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.ring-pct{font-family:'Barlow Condensed',sans-serif;font-size:44px;font-weight:900;line-height:1}
.ring-sub{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}

/* ── PHASE CARDS ── */
.phase-cards{display:flex;flex-direction:column;gap:8px;padding:0 16px}
.phase-card{background:var(--dark3);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;border:1.5px solid transparent;position:relative;overflow:hidden;transition:transform .15s,background .15s}
.phase-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--phase-color,var(--orange));border-radius:4px 0 0 4px}
.phase-card:active{transform:scale(.98);background:var(--dark4)}
.phase-card.done{border-color:var(--green);opacity:.7}
.phase-card.done::before{background:var(--green)}
.phase-card.active-phase{border-color:var(--phase-color,var(--orange))}
.phase-icon{font-size:26px;flex-shrink:0;width:40px;text-align:center}
.phase-info{flex:1;min-width:0}
.phase-name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.phase-meta{font-size:11px;color:var(--muted);margin-top:2px}
.phase-progress{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.phase-count{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700}
.phase-count.done-count{color:var(--green)}
.phase-bar-wrap{width:52px;height:4px;background:var(--dark4);border-radius:99px;overflow:hidden}
.phase-bar{height:100%;background:var(--phase-color,var(--orange));border-radius:99px;transition:width .4s ease}
.phase-card.done .phase-bar{background:var(--green)}

.start-btn{margin:16px 16px 0;color:white;border:none;border-radius:16px;padding:18px;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;letter-spacing:2px;text-transform:uppercase;width:calc(100% - 32px);cursor:pointer;transition:transform .15s,opacity .15s}
.start-btn:active{transform:scale(.97);opacity:.85}
.start-btn.btn-a{background:linear-gradient(135deg,var(--orange),var(--orange2))}
.start-btn.btn-b{background:linear-gradient(135deg,var(--blue),var(--blue2))}
.reset-btn{margin:8px 16px 0;background:transparent;color:var(--muted);border:1px solid var(--dark4);border-radius:12px;padding:10px;font-size:13px;width:calc(100% - 32px);cursor:pointer}
.reset-btn:active{color:var(--orange)}

/* ── WORKOUT ── */
#workout{background:var(--dark);overflow:hidden}
.workout-header{padding:calc(var(--safe-top) + 10px) 20px 12px;background:var(--dark2);border-bottom:1px solid var(--dark3);flex-shrink:0}
.workout-nav{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.back-btn{width:36px;height:36px;background:var(--dark3);border:none;border-radius:10px;color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.back-btn:active{background:var(--dark4)}
.workout-phase-name{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:700;text-transform:uppercase;letter-spacing:1px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.workout-phase-badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:99px;color:white;letter-spacing:.5px;flex-shrink:0}
.badge-a{background:var(--orange)}
.badge-b{background:var(--blue)}
.overall-progress-bar{height:3px;background:var(--dark4);border-radius:99px;overflow:hidden}
.overall-progress-fill{height:100%;border-radius:99px;transition:width .4s ease}
.fill-a{background:linear-gradient(90deg,var(--orange),var(--orange2))}
.fill-b{background:linear-gradient(90deg,var(--blue),var(--blue2))}
.exercises-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 16px calc(var(--safe-bottom) + 100px)}

/* ── EXERCISE CARDS ── */
.ex-card{background:var(--dark2);border-radius:18px;margin-bottom:10px;overflow:hidden;border:1.5px solid var(--dark3);transition:border-color .2s}
.ex-card.completed{border-color:var(--green);opacity:.6}
.ex-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer}
.ex-icon-wrap{width:46px;height:46px;background:var(--dark3);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.ex-card.completed .ex-icon-wrap{background:rgba(74,222,128,.12)}
.ex-info{flex:1;min-width:0}
.ex-name{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex-card.completed .ex-name{color:var(--green)}
.ex-meta{display:flex;gap:6px;margin-top:3px;flex-wrap:wrap}
.ex-tag{font-size:11px;color:var(--muted);background:var(--dark3);padding:2px 8px;border-radius:6px;font-weight:500}
.ex-tag.orange{color:var(--orange);background:rgba(232,89,26,.12)}
.ex-tag.blue{color:var(--blue2);background:rgba(59,130,246,.12)}
.ex-chevron{font-size:14px;color:var(--muted);transition:transform .2s;flex-shrink:0}
.ex-card.open .ex-chevron{transform:rotate(90deg)}
.ex-card.completed .ex-chevron{color:var(--green)}
.ex-body{display:none;padding:0 16px 16px;border-top:1px solid var(--dark3)}
.ex-card.open .ex-body{display:block}
.anim-container{background:#111113;border-radius:14px;margin:12px 0;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;height:180px}
.anim-container svg{max-width:100%;height:180px}
.anim-badge{position:absolute;top:8px;right:8px;font-size:9px;color:var(--orange);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;background:rgba(232,89,26,.15);padding:3px 8px;border-radius:99px;border:1px solid rgba(232,89,26,.3)}
.ex-tip{font-size:12px;color:var(--muted);font-style:italic;margin:8px 0 12px;padding:10px 12px;background:var(--dark3);border-radius:10px;border-left:3px solid var(--orange);line-height:1.5}
.sets-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:600;margin-bottom:8px}
.sets-grid{display:flex;gap:8px;flex-wrap:wrap}
.set-btn{flex:1;min-width:56px;max-width:80px;height:64px;background:var(--dark3);border:2px solid var(--dark4);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;color:var(--text);gap:2px}
.set-btn:active{transform:scale(.93)}
.set-btn.done{background:rgba(74,222,128,.12);border-color:var(--green);color:var(--green)}
.set-num{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;line-height:1}
.set-check{font-size:16px;display:none}
.set-btn.done .set-num{display:none}
.set-btn.done .set-check{display:block}
.set-reps-label{font-size:10px;color:var(--muted);font-weight:500}
.set-btn.done .set-reps-label{color:var(--green);opacity:.7}

/* ── TIMER ── */
#timer-overlay{position:fixed;inset:0;background:rgba(13,13,15,.97);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:999;padding-top:var(--safe-top);padding-bottom:var(--safe-bottom)}
#timer-overlay.show{display:flex}
.timer-label{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:4px;color:var(--orange);text-transform:uppercase;margin-bottom:12px}
.timer-ring-wrap{position:relative;width:220px;height:220px;margin:8px 0}
.timer-ring-wrap svg{transform:rotate(-90deg);position:absolute;top:0;left:0}
#timer-ring-bg{stroke:var(--dark3)}
#timer-ring-fill{stroke:var(--orange);stroke-linecap:round;transition:stroke-dashoffset 1s linear}
.timer-time{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.timer-seconds{font-family:'Barlow Condensed',sans-serif;font-size:72px;font-weight:900;line-height:1;color:var(--text)}
.timer-unit{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:2px}
.timer-ex-name{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;text-transform:uppercase;color:var(--text);margin-top:16px;text-align:center;padding:0 24px}
.timer-next{font-size:13px;color:var(--muted);margin-top:6px;text-align:center}
.timer-actions{display:flex;gap:12px;margin-top:32px}
.timer-skip{background:var(--dark3);color:var(--muted);border:none;border-radius:14px;padding:14px 24px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer}
.timer-done{background:var(--orange);color:white;border:none;border-radius:14px;padding:14px 32px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer}

/* ── COMPLETE ── */
#complete{align-items:center;justify-content:center;background:var(--dark);padding:32px;text-align:center}
.complete-emoji{font-size:72px;margin-bottom:16px}
.complete-title{font-family:'Barlow Condensed',sans-serif;font-size:52px;font-weight:900;text-transform:uppercase;color:var(--orange);line-height:1;margin-bottom:8px}
.complete-sub{font-size:16px;color:var(--muted);margin-bottom:32px;line-height:1.5}
.complete-stats{display:flex;gap:16px;margin-bottom:40px;width:100%}
.stat-box{flex:1;background:var(--dark3);border-radius:16px;padding:16px}
.stat-val{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:900;color:var(--orange)}
.stat-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.complete-btn{background:var(--orange);color:white;border:none;border-radius:16px;padding:18px 48px;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer}
::-webkit-scrollbar{width:0}

/* ── ANIMATIONS ── */
@keyframes squat-cycle{0%,100%{transform:translateY(0)}50%{transform:translateY(26px)}}
@keyframes squat-knee{0%,100%{transform:rotate(0deg)}50%{transform:rotate(32deg)}}
@keyframes squat-knee-r{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-32deg)}}
@keyframes bench-lift{0%,100%{transform:translateY(0)}50%{transform:translateY(22px)}}
@keyframes arm-bench{0%,100%{transform:rotate(-15deg)}50%{transform:rotate(15deg)}}
@keyframes deadlift-hinge{0%,100%{transform:rotate(0deg)}40%,60%{transform:rotate(-48deg)}}
@keyframes pulldown-bar{0%,100%{transform:translateY(0)}50%{transform:translateY(28px)}}
@keyframes pulldown-arm{0%,100%{transform:rotate(-30deg)}50%{transform:rotate(25deg)}}
@keyframes shoulder-press-up{0%,100%{transform:translateY(0)}50%{transform:translateY(-22px)}}
@keyframes curl-rotate{0%,100%{transform:rotate(5deg)}50%{transform:rotate(-75deg)}}
@keyframes hipthrust-up{0%,100%{transform:translateY(18px) rotate(12deg)}50%{transform:translateY(0px) rotate(-6deg)}}
@keyframes legpress-extend{0%,100%{transform:rotate(40deg)}50%{transform:rotate(0deg)}}
@keyframes legcurl-flex{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-70deg)}}
@keyframes plank-breathe{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes twist-rotate{0%{transform:rotate(-30deg)}50%{transform:rotate(30deg)}100%{transform:rotate(-30deg)}}
@keyframes lunge-dip{0%,100%{transform:translateY(0)}50%{transform:translateY(14px)}}
@keyframes facepull-arms{0%,100%{transform:scaleX(1.2)}50%{transform:scaleX(0.85)}}
@keyframes bike-wheel{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes breathe-ring{0%,100%{transform:scale(1);opacity:0.4}50%{transform:scale(1.35);opacity:0.9}}
@keyframes stretch-lean{0%,100%{transform:rotate(-20deg)}50%{transform:rotate(-50deg)}}
@keyframes float-up{0%,100%{transform:translateY(0);opacity:0}30%,70%{opacity:1}50%{transform:translateY(-12px);opacity:1}}
@keyframes row-pull{0%,100%{transform:rotate(-15deg)}50%{transform:rotate(25deg)}}
@keyframes incline-lift{0%,100%{transform:translateY(0) rotate(-12deg)}50%{transform:translateY(20px) rotate(-12deg)}}
@keyframes legext-kick{0%,100%{transform:rotate(-60deg)}50%{transform:rotate(0deg)}}
@keyframes dip-down{0%,100%{transform:translateY(0)}50%{transform:translateY(22px)}}
@keyframes pushup-down{0%,100%{transform:rotate(0deg) translateY(0)}50%{transform:rotate(4deg) translateY(18px)}}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="home">
  <div class="home-header">
    <div class="home-logo">FitnessPark</div>
    <div class="home-title">MA <span>SÉANCE</span></div>
    <div class="home-subtitle">Full Body · Intermédiaire · 1h15</div>
  </div>

  <!-- A/B Switcher -->
  <div class="session-switcher">
    <button class="sess-btn sess-a active-sess" id="btn-sess-a" onclick="switchSession('A')">
      <div class="sess-active-dot"></div>
      <span class="sess-letter">A</span>
      <span class="sess-label">Séance A</span>
      <span class="sess-sub">Squat · Développé · SDT</span>
      <span class="sess-pct" id="pct-a">0%</span>
    </button>
    <button class="sess-btn sess-b" id="btn-sess-b" onclick="switchSession('B')">
      <div class="sess-active-dot"></div>
      <span class="sess-letter">B</span>
      <span class="sess-label">Séance B</span>
      <span class="sess-sub">Rowing · Incliné · Leg ext</span>
      <span class="sess-pct" id="pct-b">0%</span>
    </button>
  </div>

  <div class="timeline" id="timeline"></div>

  <div class="progress-ring-wrap">
    <svg width="150" height="150" viewBox="0 0 160 160">
      <circle cx="80" cy="80" r="68" fill="none" stroke="#1E1E22" stroke-width="10"/>
      <circle id="global-ring" cx="80" cy="80" r="68" fill="none" stroke="#E8591A" stroke-width="10" stroke-linecap="round" stroke-dasharray="427.25" stroke-dashoffset="427.25"/>
    </svg>
    <div class="ring-label">
      <div class="ring-pct" id="global-pct">0%</div>
      <div class="ring-sub">complété</div>
    </div>
  </div>

  <div class="phase-cards" id="phase-cards"></div>
  <button class="start-btn btn-a" id="resume-btn" onclick="resumeWorkout()">▶ COMMENCER</button>
  <button class="reset-btn" onclick="confirmReset()">↺ Remettre à zéro</button>
</div>

<!-- WORKOUT -->
<div class="screen" id="workout">
  <div class="workout-header">
    <div class="workout-nav">
      <button class="back-btn" onclick="goHome()">‹</button>
      <div class="workout-phase-name" id="workout-phase-name"></div>
      <div class="workout-phase-badge badge-a" id="workout-phase-badge">1/4</div>
    </div>
    <div class="overall-progress-bar">
      <div class="overall-progress-fill fill-a" id="workout-progress" style="width:0%"></div>
    </div>
  </div>
  <div class="exercises-list" id="exercises-list"></div>
</div>

<!-- TIMER -->
<div id="timer-overlay">
  <div class="timer-label">⏱ TEMPS DE REPOS</div>
  <div class="timer-ring-wrap">
    <svg width="220" height="220" viewBox="0 0 220 220">
      <circle id="timer-ring-bg" cx="110" cy="110" r="98" fill="none" stroke-width="8"/>
      <circle id="timer-ring-fill" cx="110" cy="110" r="98" fill="none" stroke-width="8" stroke-dasharray="615.75" stroke-dashoffset="0"/>
    </svg>
    <div class="timer-time">
      <div class="timer-seconds" id="timer-seconds">60</div>
      <div class="timer-unit">sec</div>
    </div>
  </div>
  <div class="timer-ex-name" id="timer-ex-name"></div>
  <div class="timer-next" id="timer-next"></div>
  <div class="timer-actions">
    <button class="timer-skip" onclick="skipTimer()">Passer</button>
    <button class="timer-done" onclick="skipTimer()">✓ C'est bon</button>
  </div>
</div>

<!-- COMPLETE -->
<div class="screen" id="complete">
  <div class="complete-emoji">🏆</div>
  <div class="complete-title">Séance<br>Terminée !</div>
  <div class="complete-sub" id="complete-sub">Excellent travail !<br>Récupère bien et reviens plus fort !</div>
  <div class="complete-stats">
    <div class="stat-box"><div class="stat-val" id="stat-exos">0</div><div class="stat-lbl">Exercices</div></div>
    <div class="stat-box"><div class="stat-val" id="stat-sets">0</div><div class="stat-lbl">Séries</div></div>
    <div class="stat-box"><div class="stat-val" id="stat-time">0</div><div class="stat-lbl">Minutes</div></div>
  </div>
  <button class="complete-btn" onclick="goHome()">← Retour</button>
</div>

<script>
// ═══════════════════════════════════════════
// ANIMATIONS
// ═══════════════════════════════════════════

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let currentSess = 'A';
let states = { A: {}, B: {} };
let currentPhaseIdx = 0;
let timerInterval = null, timerRemaining = 0, timerTotal = 0;
let workoutStart = { A: null, B: null };

function defaultState(sess) {
  const s = {};
  PLANS[sess].forEach(phase => phase.exercises.forEach(ex => {
    s[ex.id] = { sets: {} };
    for (let i = 0; i < ex.sets; i++) s[ex.id].sets[i] = false;
  }));
  return s;
}

function saveState() {
  try {
    localStorage.setItem('fp5_states', JSON.stringify(states));
    localStorage.setItem('fp5_starts', JSON.stringify(workoutStart));
  } catch(e) {}
}

function loadState() {
  try {
    const s = localStorage.getItem('fp5_states');
    if (s) states = JSON.parse(s);
    else { states.A = defaultState('A'); states.B = defaultState('B'); }
    // Fill missing keys
    if (!states.A || !Object.keys(states.A).length) states.A = defaultState('A');
    if (!states.B || !Object.keys(states.B).length) states.B = defaultState('B');
    const t = localStorage.getItem('fp5_starts');
    if (t) workoutStart = JSON.parse(t);
  } catch(e) {
    states.A = defaultState('A');
    states.B = defaultState('B');
  }
}

function getState() { return states[currentSess]; }

// ── PROGRESS ──
function getPhaseProgress(sess, phaseIdx) {
  const phase = PLANS[sess][phaseIdx];
  let done = 0, total = 0;
  phase.exercises.forEach(ex => {
    total += ex.sets;
    for (let i = 0; i < ex.sets; i++) if (states[sess][ex.id]?.sets[i]) done++;
  });
  return { done, total };
}

function getGlobalProgress(sess) {
  let d = 0, t = 0;
  PLANS[sess].forEach((_, i) => { const p = getPhaseProgress(sess, i); d += p.done; t += p.total; });
  return t > 0 ? d / t : 0;
}

function isExDone(sess, id, n) {
  for (let i = 0; i < n; i++) if (!states[sess][id]?.sets[i]) return false;
  return true;
}

function isPhaseDone(sess, idx) {
  return PLANS[sess][idx].exercises.every(ex => isExDone(sess, ex.id, ex.sets));
}

// ═══════════════════════════════════════════
// HOME
// ═══════════════════════════════════════════
function switchSession(sess) {
  currentSess = sess;
  document.getElementById('btn-sess-a').classList.toggle('active-sess', sess === 'A');
  document.getElementById('btn-sess-b').classList.toggle('active-sess', sess === 'B');
  renderHome();
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function renderHome() {
  // Update both percentages on switcher buttons
  ['A','B'].forEach(s => {
    const pct = Math.round(getGlobalProgress(s) * 100);
    document.getElementById('pct-' + s.toLowerCase()).textContent = pct + '%';
  });

  const pct = Math.round(getGlobalProgress(currentSess) * 100);
  const isB = currentSess === 'B';
  const accentColor = isB ? '#3B82F6' : '#E8591A';

  const circ = 2 * Math.PI * 68;
  const ring = document.getElementById('global-ring');
  ring.style.strokeDashoffset = circ * (1 - pct / 100);
  ring.style.stroke = accentColor;
  document.getElementById('global-pct').textContent = pct + '%';
  document.getElementById('global-pct').style.color = accentColor;

  // Timeline
  const tl = document.getElementById('timeline');
  tl.innerHTML = '';
  PLANS[currentSess].forEach((p, i) => {
    if (i > 0) {
      const sep = document.createElement('div');
      sep.className = 'tl-sep';
      tl.appendChild(sep);
    }
    const done = isPhaseDone(currentSess, i);
    const block = document.createElement('div');
    block.className = 'tl-block';
    const pill = document.createElement('div');
    pill.className = 'tl-pill';
    pill.style.color = done ? '#0D0D0F' : p.color;
    pill.style.borderColor = done ? '#4ADE80' : p.color;
    pill.style.background = done ? '#4ADE80' : 'transparent';
    pill.textContent = (done ? '✓ ' : '') + p.name;
    const time = document.createElement('div');
    time.className = 'tl-time';
    time.textContent = p.duration;
    block.appendChild(pill);
    block.appendChild(time);
    tl.appendChild(block);
  });

  // Phase cards
  const c = document.getElementById('phase-cards');
  c.innerHTML = '';
  PLANS[currentSess].forEach((phase, idx) => {
    const prog = getPhaseProgress(currentSess, idx);
    const done = isPhaseDone(currentSess, idx);
    const isActive = !done && (idx === 0 || isPhaseDone(currentSess, idx - 1));
    const card = document.createElement('div');
    card.className = 'phase-card' + (done ? ' done' : '') + (isActive ? ' active-phase' : '');
    card.style.setProperty('--phase-color', phase.color);
    card.onclick = () => openPhase(idx);
    const phasePct = prog.total > 0 ? Math.round(prog.done / prog.total * 100) : 0;
    card.innerHTML = `
      <div class="phase-icon">${phase.icon}</div>
      <div class="phase-info">
        <div class="phase-name">${phase.name}</div>
        <div class="phase-meta">${phase.duration} · ${phase.exercises.length} exercice${phase.exercises.length > 1 ? 's' : ''}</div>
      </div>
      <div class="phase-progress">
        <div class="phase-count ${done ? 'done-count' : ''}">${done ? '✓' : prog.done + '/' + prog.total}</div>
        <div class="phase-bar-wrap"><div class="phase-bar" style="width:${phasePct}%"></div></div>
      </div>`;
    c.appendChild(card);
  });

  // Start button
  const btn = document.getElementById('resume-btn');
  btn.className = 'start-btn ' + (isB ? 'btn-b' : 'btn-a');
  if (pct === 100) { btn.textContent = '🏆 SÉANCE ' + currentSess + ' TERMINÉE !'; btn.onclick = showComplete; }
  else if (pct > 0) { btn.textContent = '▶ REPRENDRE SÉANCE ' + currentSess + ' — ' + pct + '%'; btn.onclick = resumeWorkout; }
  else { btn.textContent = '▶ COMMENCER SÉANCE ' + currentSess; btn.onclick = resumeWorkout; }
}

// ═══════════════════════════════════════════
// WORKOUT
// ═══════════════════════════════════════════
function openPhase(idx) {
  currentPhaseIdx = idx;
  if (!workoutStart[currentSess]) workoutStart[currentSess] = Date.now();
  renderWorkout();
  showScreen('workout');
}

function resumeWorkout() {
  let t = 0;
  for (let i = 0; i < PLANS[currentSess].length; i++) {
    if (!isPhaseDone(currentSess, i)) { t = i; break; }
    t = i;
  }
  openPhase(t);
}

function renderWorkout() {
  const isB = currentSess === 'B';
  const phase = PLANS[currentSess][currentPhaseIdx];
  document.getElementById('workout-phase-name').textContent = phase.icon + ' ' + phase.name;
  const badge = document.getElementById('workout-phase-badge');
  badge.textContent = 'Séance ' + currentSess + ' · ' + (currentPhaseIdx + 1) + '/' + PLANS[currentSess].length;
  badge.className = 'workout-phase-badge ' + (isB ? 'badge-b' : 'badge-a');
  const fill = document.getElementById('workout-progress');
  fill.style.width = Math.round(getGlobalProgress(currentSess) * 100) + '%';
  fill.className = 'overall-progress-fill ' + (isB ? 'fill-b' : 'fill-a');

  const list = document.getElementById('exercises-list');
  list.innerHTML = '';
  const firstUndone = phase.exercises.findIndex(e => !isExDone(currentSess, e.id, e.sets));

  phase.exercises.forEach((ex, exIdx) => {
    const done = isExDone(currentSess, ex.id, ex.sets);
    const card = document.createElement('div');
    card.className = 'ex-card' + (done ? ' completed' : '');
    card.id = 'ex-card-' + ex.id;

    let setsHTML = '';
    for (let i = 0; i < ex.sets; i++) {
      const isDone = states[currentSess][ex.id]?.sets[i];
      const tagClass = isB ? 'blue' : 'orange';
      setsHTML += `<button class="set-btn ${isDone ? 'done' : ''}" id="set-${ex.id}-${i}" onclick="toggleSet('${ex.id}',${i},${ex.sets},${ex.rest},'${ex.name.replace(/'/g,"\\'")}')">
        <span class="set-check">✓</span><span class="set-num">${i + 1}</span>
        <span class="set-reps-label">${ex.reps}</span></button>`;
    }

    const animSVG = ANIMS[ex.anim] || '';
    const tagClass = isB ? 'blue' : 'orange';
    card.innerHTML = `
      <div class="ex-header" onclick="toggleCard('${ex.id}')">
        <div class="ex-icon-wrap">${ex.icon}</div>
        <div class="ex-info">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-meta">
            <span class="ex-tag ${tagClass}">${ex.sets} série${ex.sets > 1 ? 's' : ''}</span>
            <span class="ex-tag">${ex.reps}</span>
            ${ex.rest > 0 ? `<span class="ex-tag">⏱ ${ex.rest}s repos</span>` : ''}
          </div>
        </div>
        <span class="ex-chevron">${done ? '✓' : '›'}</span>
      </div>
      <div class="ex-body">
        <div class="anim-container">${animSVG}<div class="anim-badge">ANIMATION</div></div>
        <div class="ex-tip">💡 ${ex.tip}</div>
        <div class="sets-label">Séries effectuées</div>
        <div class="sets-grid">${setsHTML}</div>
      </div>`;

    if (!done && exIdx === firstUndone) card.classList.add('open');
    list.appendChild(card);
  });
}

function toggleCard(id) {
  const card = document.getElementById('ex-card-' + id);
  if (!card) return;
  const open = card.classList.contains('open');
  document.querySelectorAll('.ex-card.open').forEach(c => c.classList.remove('open'));
  if (!open) card.classList.add('open');
}

function toggleSet(exId, setIdx, numSets, restSec, exName) {
  if (!states[currentSess][exId]) states[currentSess][exId] = { sets: {} };
  states[currentSess][exId].sets[setIdx] = !states[currentSess][exId].sets[setIdx];
  saveState();

  const btn = document.getElementById(`set-${exId}-${setIdx}`);
  if (btn) {
    btn.classList.toggle('done', states[currentSess][exId].sets[setIdx]);
    if (states[currentSess][exId].sets[setIdx] && 'vibrate' in navigator) navigator.vibrate(40);
  }

  const exDone = isExDone(currentSess, exId, numSets);
  const card = document.getElementById('ex-card-' + exId);
  if (card) {
    card.classList.toggle('completed', exDone);
    const ch = card.querySelector('.ex-chevron');
    if (ch) ch.textContent = exDone ? '✓' : '›';
  }

  const fill = document.getElementById('workout-progress');
  fill.style.width = Math.round(getGlobalProgress(currentSess) * 100) + '%';

  if (states[currentSess][exId].sets[setIdx] && parseInt(restSec) > 0) {
    const next = setIdx + 1 < numSets ? `Série ${setIdx + 2}/${numSets} à venir` : 'Dernière série terminée !';
    startTimer(parseInt(restSec), exName, next);
  }

  if (isPhaseDone(currentSess, currentPhaseIdx)) {
    setTimeout(() => {
      if (getGlobalProgress(currentSess) >= 1) showComplete();
      else showPhaseDoneBanner();
    }, 400);
  }
}

// ═══════════════════════════════════════════
// TIMER
// ═══════════════════════════════════════════
function startTimer(sec, name, next) {
  timerTotal = sec; timerRemaining = sec;
  document.getElementById('timer-ex-name').textContent = name;
  document.getElementById('timer-next').textContent = next;
  const circ = 2 * Math.PI * 98;
  document.getElementById('timer-ring-fill').style.strokeDasharray = circ;
  updateTimerDisplay();
  document.getElementById('timer-overlay').classList.add('show');
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timerRemaining--;
    updateTimerDisplay();
    if (timerRemaining <= 0) {
      clearInterval(timerInterval);
      if ('vibrate' in navigator) navigator.vibrate([100, 50, 100]);
      setTimeout(skipTimer, 600);
    }
  }, 1000);
}

function updateTimerDisplay() {
  document.getElementById('timer-seconds').textContent = timerRemaining;
  const circ = 2 * Math.PI * 98;
  const fill = document.getElementById('timer-ring-fill');
  fill.style.strokeDashoffset = circ * (timerRemaining / timerTotal);
  fill.style.stroke = timerRemaining <= 5 ? '#FF4757' : timerRemaining <= 15 ? '#FF9F43' : '#E8591A';
}

function skipTimer() {
  clearInterval(timerInterval);
  document.getElementById('timer-overlay').classList.remove('show');
}

function showPhaseDoneBanner() {
  const b = document.createElement('div');
  const isB = currentSess === 'B';
  b.style.cssText = `position:fixed;bottom:calc(env(safe-area-inset-bottom,20px) + 20px);left:16px;right:16px;
    background:${isB ? 'linear-gradient(135deg,#3B82F6,#60A5FA)' : 'linear-gradient(135deg,#E8591A,#FF7A3D)'};
    color:white;border-radius:16px;padding:16px 20px;
    font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;
    letter-spacing:1px;text-align:center;z-index:100;text-transform:uppercase;`;
  const next = PLANS[currentSess][currentPhaseIdx + 1];
  b.textContent = '✓ Phase terminée ! → ' + (next?.name || 'Séance finie !');
  document.body.appendChild(b);
  setTimeout(() => b.remove(), 3000);
  if (currentPhaseIdx + 1 < PLANS[currentSess].length) {
    setTimeout(() => {
      currentPhaseIdx++;
      renderWorkout();
      const l = document.getElementById('exercises-list');
      if (l) l.scrollTop = 0;
    }, 1200);
  }
}

function showComplete() {
  const plan = PLANS[currentSess];
  let te = 0, ts = 0;
  plan.forEach(p => { te += p.exercises.length; p.exercises.forEach(ex => ts += ex.sets); });
  const start = workoutStart[currentSess];
  const mins = start ? Math.round((Date.now() - start) / 60000) : 67;
  document.getElementById('stat-exos').textContent = te;
  document.getElementById('stat-sets').textContent = ts;
  document.getElementById('stat-time').textContent = mins;
  document.getElementById('complete-sub').textContent = `Séance ${currentSess} bouclée ! Récupère bien 💪`;
  showScreen('complete');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() { renderHome(); showScreen('home'); }

function confirmReset() {
  if (confirm(`Remettre la séance ${currentSess} à zéro ?`)) {
    states[currentSess] = defaultState(currentSess);
    workoutStart[currentSess] = null;
    saveState();
    renderHome();
  }
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
loadState();
renderHome();
</script>
